name = "recordingmgmt"
main = "_worker.js"
compatibility_date = "2025-11-13"
account_id = "521c322a89a17bb69f91f1e65177606e"

[assets]
directory = "./dist"

# -----------------------------------------------------------------------------
# Tenancy
# -----------------------------------------------------------------------------
# Each tenant has:
#   - public config in TENANTS_JSON below (slug, displayName, accountId, clientId,
#     domains, isProduction)
#   - a per-tenant Zoom client secret stored as a wrangler secret named
#     ZOOM_CLIENT_SECRET_<SLUG_UPPER>  e.g. ZOOM_CLIENT_SECRET_PACKETFUSION
#     Set with:  npx wrangler secret put ZOOM_CLIENT_SECRET_PACKETFUSION
#
# `domains` is the email-domain allowlist for that tenant (CF Access already
# authenticated the user; we map their email's domain to a tenant here).
# `isProduction: true` triggers extra delete-friction in the UI.
#
# SUPER_ADMINS is a comma-separated list of emails that can switch into any
# tenant via the header dropdown (sets an active_tenant cookie).
# -----------------------------------------------------------------------------

# CF Access strict mode: when both CF_ACCESS_TEAM_DOMAIN and CF_ACCESS_AUD are
# set, the worker cryptographically verifies the Cf-Access-Jwt-Assertion header
# instead of trusting the email header. Find the AUD on the Access app's
# overview page in Zero Trust dashboard. Leave both blank to keep the legacy
# header-trust behavior (only safe if Access is unconditionally in front).
[vars]
SUPER_ADMINS = "rdyla@packetfusion.com"
CF_ACCESS_TEAM_DOMAIN = ""
CF_ACCESS_AUD = ""
TENANTS_JSON = '''
[
  {
    "slug": "packetfusion",
    "displayName": "Packet Fusion (test)",
    "accountId": "EBOAoB2WQ4WnFIT5ZKzmdw",
    "clientId": "lONO2jrBQsGSHpT8R9dhWg",
    "domains": ["packetfusion.com"],
    "isProduction": false
  },
  {
    "slug": "concordia",
    "displayName": "Concordia University",
    "accountId": "E5oJB6VgRbG7SCBkjYdcDQ",
    "clientId": "289_wbxMR1SDeIciqaNrgw",
    "domains": ["cui.edu"],
    "isProduction": true
  }
]
'''
